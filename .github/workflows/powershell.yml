# Veeam-PS1-Scanner-Yara-Rule-Detection-Onion-Links
# PowerShell static analysis (PSScriptAnalyzer) for the Veeam YARA Secure Restore scanner.
#
# This workflow lints the repository's PowerShell scanner script
# (Veeam-YARA-SecureRestore.ps1) for security and quality issues, then publishes
# the findings as SARIF to GitHub's Security > Code scanning dashboard.
#
# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
#
# https://github.com/microsoft/action-psscriptanalyzer
# For more information on PSScriptAnalyzer in general, see
# https://github.com/PowerShell/PSScriptAnalyzer

name: Veeam-PS1-Scanner-Yara-Rule-Detection-Onion-Links

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.ps1'
      - '**.psm1'
      - '**.psd1'
      - '.github/workflows/powershell.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - '**.ps1'
      - '**.psm1'
      - '**.psd1'
      - '.github/workflows/powershell.yml'
  schedule:
    - cron: '20 7 * * 5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        uses: microsoft/psscriptanalyzer-action@6b2948b1944407914a58661c49941824d149734f
        with:
          # Check https://github.com/microsoft/action-psscriptanalyzer for more info about the options.
          # Analyze the entire repository recursively (currently Veeam-YARA-SecureRestore.ps1).
          path: .\
          recurse: true
          # Security-focused rule set tailored to a YARA scanner that shells out to
          # yara64.exe, runs background jobs, and handles file paths / session IDs.
          # Remove this option to run the full default PSScriptAnalyzer rule set.
          includeRule: '"PSAvoidGlobalAliases", "PSAvoidUsingConvertToSecureStringWithPlainText", "PSAvoidUsingPlainTextForPassword", "PSAvoidUsingInvokeExpression", "PSUsePSCredentialType", "PSAvoidUsingComputerNameHardcoded", "PSAvoidUsingUsernameAndPasswordParams"'
          output: results.sarif

      # Upload the SARIF file generated in the previous step
      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      # Fallback: also publish the raw SARIF as a build artifact so findings stay
      # accessible even if code-scanning upload is unavailable (e.g. a private
      # repo without GitHub Advanced Security). Runs regardless of prior outcome.
      - name: Upload SARIF as build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: psscriptanalyzer-sarif
          path: results.sarif
          if-no-files-found: warn

  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      # ── 1. PowerShell AST parse check ────────────────────────────────────────
      # Confirms the script has no syntax errors on PS7 and contains none of the
      # PS7-only parse-breaking operators (??=, ?., &&, ||, ternary) that would
      # cause a parse failure on Windows PowerShell 5.1.
      - name: PowerShell syntax check
        shell: pwsh
        run: |
          $errors = $null; $tokens = $null
          $null = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path 'Veeam-YARA-SecureRestore.ps1'),
              [ref]$tokens, [ref]$errors)
          if ($errors -and $errors.Count -gt 0) {
              $errors | ForEach-Object {
                  Write-Error "Line $($_.Extent.StartLineNumber): $($_.Message)"
              }
              exit 1
          }
          Write-Host "Parse OK — $($tokens.Count) tokens, 0 errors."

          # Static check for PS7-only parse-breaking operators.
          # These parse cleanly in PS7 but fail under Windows PowerShell 5.1.
          $content = Get-Content 'Veeam-YARA-SecureRestore.ps1' -Raw
          $ps7only = @{
              'null-coalescing ??'   = '\?\?[^?]'
              'null-assignment ??='  = '\?\?='
              'null-conditional ?.'  = '\?\.'
              'pipeline chain && ||' = '(\|\||(?<![|])&&(?![|]))'
          }
          $found = @()
          foreach ($label in $ps7only.Keys) {
              if ($content -match $ps7only[$label]) { $found += $label }
          }
          if ($found) {
              Write-Error "PS7-only operators detected (break on PS5.1): $($found -join ', ')"
              exit 1
          }
          Write-Host "No PS7-only parse-breaking operators found."

      # ── 2. YARA rule syntax validation ───────────────────────────────────────
      # Compiles all .yara / .yar rule files to catch syntax errors before they
      # silently produce empty scan results at runtime. YARA exit codes:
      # 0 = match found, 1 = no matches, >1 = error. Scanning /dev/null should
      # return 1 (no matches); any other exit signals a rule syntax problem.
      - name: Install YARA
        run: sudo apt-get install -y --no-install-recommends yara

      - name: YARA rule syntax check
        run: |
          fail=0
          for f in $(find . -name '*.yar' -o -name '*.yara'); do
            yara -w "$f" /dev/null
            code=$?
            if [ $code -gt 1 ]; then
              echo "::error file=$f::YARA rule syntax error (exit $code): $f"
              fail=1
            else
              echo "OK: $f"
            fi
          done
          exit $fail
